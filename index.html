    <p id="cache"></p>

    <!-- <p id="cache1">null</p>

<script>
let count1 = 0;
let count2 = 0;
let count3 = 0;
let count4 = 0;
let count5 = 0;

let v = 5;
let w = 4;
let x = 3;
let y = 2;
let z = 1;

const data = [
    [5, 5, 5, 1, 4, 'H', '1', '水素', '水素の説明'],
    [1, 2, 2, 2, 5, 'C', '6', '炭素', '炭素の説明'],
    [5, 5, 5, 1, 5, 'N', '7', '窒素', '窒素の説明'],
    [5, 5, 4, 1, 5, 'O', '8', '酸素', '酸素の説明'],

    [5, 5, 2, 2, 1, 'F', '9', 'フッ素', 'フッ素の説明'],
    [2, 2, 2, 2, 1, 'Na', '11', 'ナトリウム', 'ナトリウムの説明'],
    [2, 1, 4, 1, 2, 'Al', '13', 'アルミニウム', 'アルミニウムの説明'],
    [2, 2, 5, 1, 5, 'P', '15', 'リン', 'リンの説明'],

    //[3, 3, 3, 3, 3, 'Bk', '97', 'バークリウム', 'バークリウムの説明'],
    [1, 2, 4, 2, 1, 'Ca', '20', 'カルシウム', 'カルシウムの説明'],
    [1, 1, 5, 4, 2, 'Fe', '26', '鉄', '鉄の説明'],
    [1, 1, 1, 1, 4, 'Cu', '29', '銅', '銅の説明'],

    [1, 2, 2, 4, 4, 'Ag', '47', '銀', '銀の説明'],
    [1, 1, 1, 4, 4, 'Pt', '78', '白金', '白金の説明'],
    [1, 4, 1, 5, 4, 'Au', '79', '金', '金の説明'],
    [4, 4, 1, 2, 4, 'Hg', '80', '水銀', '水銀の説明'],
];

function Hyes1() { count1 = v; document.getElementById("result1").textContent = count1; }
function Lyes1() { count1 = w; document.getElementById("result1").textContent = count1; }
function idk1()  { count1 = x; document.getElementById("result1").textContent = count1; }
function Lno1()  { count1 = y; document.getElementById("result1").textContent = count1; }
function Hno1()  { count1 = z; document.getElementById("result1").textContent = count1; }

function Hyes2() { count2 = v; document.getElementById("result2").textContent = count2; }
function Lyes2() { count2 = w; document.getElementById("result2").textContent = count2; }
function idk2()  { count2 = x; document.getElementById("result2").textContent = count2; }
function Lno2()  { count2 = y; document.getElementById("result2").textContent = count2; }
function Hno2()  { count2 = z; document.getElementById("result2").textContent = count2; }

function Hyes3() { count3 = v; document.getElementById("result3").textContent = count3; }
function Lyes3() { count3 = w; document.getElementById("result3").textContent = count3; }
function idk3()  { count3 = x; document.getElementById("result3").textContent = count3; }
function Lno3()  { count3 = y; document.getElementById("result3").textContent = count3; }
function Hno3()  { count3 = z; document.getElementById("result3").textContent = count3; }

function Hyes4() { count4 = v; document.getElementById("result4").textContent = count4; }
function Lyes4() { count4 = w; document.getElementById("result4").textContent = count4; }
function idk4()  { count4 = x; document.getElementById("result4").textContent = count4; }
function Lno4()  { count4 = y; document.getElementById("result4").textContent = count4; }
function Hno4()  { count4 = z; document.getElementById("result4").textContent = count4; }

function Hyes5() { count5 = v; document.getElementById("result5").textContent = count5; }
function Lyes5() { count5 = w; document.getElementById("result5").textContent = count5; }
function idk5()  { count5 = x; document.getElementById("result5").textContent = count5; }
function Lno5()  { count5 = y; document.getElementById("result5").textContent = count5; }
function Hno5()  { count5 = z; document.getElementById("result5").textContent = count5; }

function sindan() { 
    if (count1 === count2 && count2 === count3 && count3 === count4 && count4 === count5 && count5 === 3) {
        //[3, 3, 3, 3, 3, 'Bk', '97', 'バークリウム', 'バークリウムの説明'],
        document.getElementById("cache").textContent = `原子番号97, 元素記号Bk, バークリウム`;
        document.getElementById("cache0").textContent = `バークリウムの説明`;
    }
    else {
        let sum = 0;
        let sums = [];
        for (let dt of data) {
            sum = (dt[0] - count1)**2 + (dt[1] - count2)**2 + (dt[2] - count3)**2 + (dt[3] - count4)**2 + (dt[4] - count5)**2
            sums.push(sum)
        };
        // document.getElementById("cache1").textContent = `${count1}, ${count2}, ${count3}, ${count4}, ${count5}`;
        // document.getElementById("cache2").textContent = sums;

        const getMin = (a, b) => Math.min(a, b);
        const min = sums.reduce(getMin);
        let ans = 0

        for (let i = 0; i < 15; i++) {
            if ( sums[i] === min ) {
                ans = i
            }
        }
        document.getElementById("cache").textContent = `原子番号${data[ans][6]}, 元素記号${data[ans][5]}, ${data[ans][7]}`;
        document.getElementById("cache0").textContent = `${data[ans][8]}`;
    }
}
