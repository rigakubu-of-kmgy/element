<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>元素診断</title>
    <style>
        button {
            position: relative;
            overflow: visible;
            z-index: 2;
            background: transparent;
            border: 2px solid #333;
            cursor: pointer; 
            padding: 9px 44px;
            border-radius: 1px;
        }
        button.selected {
            font-weight: bold;
            outline: 2px solid #333;
            background-color: #f8c8dc;
            border-radius: 1px;
        }
        .question-block {
            margin-bottom: 1em;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .question-label {
            position: relative;
            z-index: 2;
            flex-basis: 100%;
        }
    </style>
</head>
<body>
    <h1>元素診断</h1>
    <h3>貴方によく似た元素を診断します</h3>
    <p>Ver : 5.0.0 </p>

    <div id="questions"></div>

    <button type="button" onclick="sindan()">診断</button>

    <p id="cache"></p>
    <p id="cache0"></p>
    <p>----------------console----------------</p>
    <p id="cache1">null</p>
    <p id="cache2">null</p>

<script>

const v = 4, w = 3, x = 2.5, y = 2, z = 1;
const hy = 4, ly = 3, ln = 2, hn = 1;

const questions = [
    "気分屋だ(三態)",
    "周りに流されやすい(硬度)",
    "自分は珍しい人間だ(稀少度)",
    "貯金は得意だ(価値)",
    "メンタルは強いほうだ(イオン化傾向)",
    "見た目には気を使っている(綺麗か)"
];

const choices = [
    ["凄くそう思う", v],
    ["そう思う　　", w],
    ["わからない　", x],
    ["そう思わない", y],
    ["全く思わない", z]
];

let counts = new Array(questions.length).fill(null);

const container = document.getElementById("questions");

questions.forEach((qText, qIndex) => {
    const block = document.createElement("div");
    block.className = "question-block";

    const label = document.createElement("div");
    label.className = "question-label";
    label.textContent = `Q${qIndex + 1}. ${qText}`;
    block.appendChild(label);

    choices.forEach(([choiceLabel, value]) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = choiceLabel;
        btn.addEventListener("click", () => {
            counts[qIndex] = value;
            block.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
        });
        block.appendChild(btn);
    });

    container.appendChild(block);
});

const data = [
    [hy, hy, hy, hn, ly, ln, 'H', '1', '水素', '水素の説明'],
    [hn, ln, ln, ln, hy, hy , 'C', '6', '炭素', '炭素の説明'],
    [hy, hy, hy, hn, hy, ly, 'N', '7', '窒素', '窒素の説明'],
    [hy, hy, ly, hn, hy, ln,  'O', '8', '酸素', '酸素の説明'],

    [hy, hy, ln, ln, hn, hn, 'F', '9', 'フッ素', 'フッ素の説明'],
    [ln, ln, ln, ln, hn, hn, 'Na', '11', 'ナトリウム', 'ナトリウムの説明'],
    [ln, hn, ly, hn, ln, ly, 'Al', '13', 'アルミニウム', 'アルミニウムの説明'],
    [ln, ln, hy, hn, hy, ly, 'P', '15', 'リン', 'リンの説明'],

    [hn, ln, ly, ln, hn, hn, 'Ca', '20', 'カルシウム', 'カルシウムの説明'],
    [hn, hn, hy, ly, ln, ln, 'Fe', '26', '鉄', '鉄の説明'],
    [hn, hn, hn, hn, ly, ly, 'Cu', '29', '銅', '銅の説明'],
    [hn, ln, ln, ly, ly, ly, 'Ag', '47', '銀', '銀の説明'],

    [hn, hn, hn, ly, ly, hy, 'Pt', '78', '白金', '白金の説明'],
    [hn, ly, hn, hy, ly, hy, 'Au', '79', '金', '金の説明'],
    [ly, ly, hn, ln, ly, ly, 'Hg', '80', '水銀', '水銀の説明'],
    [ln, hy, hy, hy, hn, hy, 'Bi', '83', 'ビスマス', 'ビスマスの説明']
];

function mergeAlternating(arr1, arr2) {
    const result = [];
    const maxLength = Math.max(arr1.length, arr2.length);
    for (let i = 0; i < maxLength; i++) {
        if (i < arr1.length) result.push(arr1[i]);
        if (i < arr2.length) result.push(arr2[i]);
    }
    return result;
}

function sindan() {
    if (counts.includes(null)) {
        document.getElementById("cache").textContent = "すべての質問に答えてください";
        document.getElementById("cache0").textContent = "";
        return;
    }

    if (counts.every(c => c === x)) {
        document.getElementById("cache").textContent = `原子番号97, 元素記号Bk, バークリウム`;
        document.getElementById("cache0").textContent = `バークリウムの説明`;
        return;
    }

    let sums = [];
    let ele = [];
    let sumc = [];

    for (let dt of data) {
        let sum = 0;
        for (let i = 0; i < counts.length; i++) {
            sum += (dt[i] - counts[i]) ** 2;
        }
        sums.push(sum);
        ele.push(dt[6]);
        sumc.push(`${sum}     `);
    }

    document.getElementById("cache1").textContent = `get: ${counts.join(', ')}`;
    document.getElementById("cache2").textContent = mergeAlternating(ele, sumc);

    const min = Math.min(...sums);
    const ans = sums.indexOf(min);

    document.getElementById("cache").textContent = `原子番号${data[ans][7]}, 元素記号${data[ans][6]}, ${data[ans][8]}`;
    document.getElementById("cache0").textContent = `${data[ans][9]}`;
}
</script>
</body>
</html>
