function mergeAlternating(arr1, arr2) {
    const result = [];
    const maxLength = Math.max(arr1.length, arr2.length);

    for (let i = 0; i < maxLength; i++) {
        if (i < arr1.length) result.push(arr1[i]);
        if (i < arr2.length) result.push(arr2[i]);
    }

    return result;
}

function sindan() { 
    if (count1 === count2 && count2 === count3 && count3 === count4 && count4 === count5 && count5 === count6 && count6 === 2.5) {
        //[3, 3, 3, 3, 3, 'Bk', '97', 'バークリウム', 'バークリウムの説明'],
        document.getElementById("cache").textContent = `原子番号97, 元素記号Bk, バークリウム`;

    }
    else {
        let sum = 0;
        let sums = [];
        //debug
        let ele = [];
        let sumc = [];

            sum = (dt[0] - count1)**2 + (dt[1] - count2)**2 + (dt[2] - count3)**2 + (dt[3] - count4)**2 + (dt[4] - count5)**2 + (dt[5] - count6)**2;

            sumc.push(`${sum}     `)
            
        };

        // document.getElementById("cache3").textContent = ele;

        const getMin = (a, b) => Math.min(a, b);
        const min = sums.reduce(getMin);
        let ans = 0

        for (let i = 0; i < 16; i++) {
            if ( sums[i] === min ) {
                ans = i
            }
        }
